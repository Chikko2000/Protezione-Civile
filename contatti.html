<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contatti - Protezione Civile Grottammare</title>

<link rel="icon" type="image/png" href="img/favicon.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --primary: #0059b3;
  --primary-dark: #003f80;
  --accent: #25D366;
  --bg: #f5f7fb;
  --border: #e5e7eb;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
}

/* HERO */
.hero {
  height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(rgba(0,48,98,0.6), rgba(0,48,98,0.6)), url('img/contatti.jpg') center/cover;
  color: white;
  text-align: center;
}

/* CARD */
.card-box {
  background: white;
  border-radius: 18px;
  padding: 25px;
  border: 1px solid var(--border);
  text-align: center;
  transition: 0.3s;
  height: 100%;
}

.card-box:hover {
  transform: translateY(-5px);
}

.icon {
  font-size: 1.8rem;
  color: var(--primary);
}

/* MAPPA */
.map-box {
  margin-top: 40px;
  border-radius: 20px;
  overflow: hidden;
}

/* FORM */
.form-control {
  border-radius: 10px;
  padding: 12px;
}

.btn-main {
  background: var(--primary);
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  font-weight: 700;
}

.btn-whatsapp {
  background: var(--accent);
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
}

/* LOADING */
.loader {
  display: none;
  margin-top: 10px;
}

/* SUCCESS */
.success-message {
  display: none;
  margin-top: 15px;
  padding: 10px;
  background: #d1fae5;
  border-radius: 8px;
  color: #065f46;
  font-weight: 600;
}

footer {
  text-align: center;
  padding: 20px;
  margin-top: 40px;
  background: white;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <h1>Contatti</h1>
    <p>Scrivici o vieni a trovarci</p>
  </div>
</div>

<div class="container mt-5">

  <!-- CONTATTI -->
  <div class="row g-4">

    <div class="col-md-3">
      <div class="card-box">
        <div class="icon"><i class="fas fa-phone"></i></div>
        <h5>Telefono</h5>
        <p><a href="tel:+393295396305">329 5396305</a></p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box">
        <div class="icon"><i class="fas fa-envelope"></i></div>
        <h5>Email</h5>
        <p><a href="mailto:protezionecivile@comune.grottammare.ap.it">
        protezionecivile@comune.grottammare.ap.it</a></p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box">
        <div class="icon"><i class="fas fa-location-dot"></i></div>
        <h5>Sede</h5>
        <p><a href="https://www.google.com/maps?q=Piazza+Stazione+6,+Grottammare" target="_blank">
        Piazza Stazione 6<br>Grottammare (AP)</a></p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box">
        <div class="icon"><i class="fab fa-whatsapp"></i></div>
        <h5>WhatsApp</h5>
        <a href="https://wa.me/393295396305" class="btn-whatsapp" target="_blank">
          Scrivici
        </a>
      </div>
    </div>

  </div>

  <!-- MAPPA -->
  <div class="map-box">
    <iframe src="https://www.google.com/maps?q=Piazza+Stazione+6,+Grottammare&output=embed"
      width="100%" height="350"></iframe>
  </div>

  <!-- FORM -->
  <div class="mt-5">
    <h3>Contattaci</h3>

    <form id="contactForm" action="https://formspree.io/f/yourformid" method="POST">

      <input type="hidden" name="_subject" value="Nuovo messaggio dal sito">

      <input type="text" class="form-control mb-3" name="name" placeholder="Nome" required>
      <input type="email" class="form-control mb-3" name="email" placeholder="Email" required>
      <textarea class="form-control mb-3" name="message" placeholder="Messaggio" required></textarea>

      <button type="submit" class="btn-main">
        <i class="fas fa-paper-plane"></i> Invia
      </button>

      <div class="loader" id="loader">
        ⏳ Invio in corso...
      </div>

      <div class="success-message" id="successMessage">
        ✅ Messaggio inviato con successo!
      </div>

    </form>
  </div>

</div>

<footer>
© 2025 Protezione Civile Grottammare
</footer>

<script>
const form = document.getElementById("contactForm");
const loader = document.getElementById("loader");
const success = document.getElementById("successMessage");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  loader.style.display = "block";

  const data = new FormData(form);

  await fetch(form.action, {
    method: form.method,
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  loader.style.display = "none";
  success.style.display = "block";
  form.reset();
});
</script>

</body>
</html>
