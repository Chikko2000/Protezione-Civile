<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mezzi - Protezione Civile Grottammare</title>

<link rel="icon" type="image/png" href="img/logo.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background:#f5f7fb; }

/* NAVBAR */
.navbar { background:#fff; border-bottom:1px solid #e5e7eb; }
.navbar-brand img { height:60px; }
.nav-link { font-weight:700; color:#0059b3 !important; }

/* HERO */
.hero {
  background:linear-gradient(rgba(0,48,98,0.6),rgba(0,48,98,0.6)),url('img/Mezzi.jpeg') center/cover;
  color:white;
  text-align:center;
  padding:100px 20px;
}
.hero h1 { font-size:3rem; font-weight:800; }

/* CARD */
.mezzo-card {
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.3s;
}
.mezzo-card:hover { transform:translateY(-5px); }

.mezzo-img-wrap img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.mezzo-card-body { padding:18px; }
.mezzo-card-body h5 { color:#0059b3; font-weight:800; }

.mezzo-meta {
  border-top:1px solid #eee;
  padding-top:10px;
}

.mezzo-tag {
  background:#eaf3ff;
  color:#0059b3;
  padding:6px 10px;
  border-radius:20px;
  font-size:0.8rem;
}

/* MODAL */
.modal-content { border-radius:20px; }

.modal-main-image {
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:15px;
}

.thumb-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.thumb-grid img {
  width:100%;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

/* FOOTER */
footer {
  background:white;
  text-align:center;
  padding:25px;
  border-top:1px solid #eee;
}

.social-links a {
  margin:0 10px;
  font-size:20px;
  color:white;
  padding:10px;
  border-radius:50%;
}

.social-facebook { background:#1877f2; }
.social-instagram { background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045); }
</style>
</head>

<body>

<header class="navbar navbar-expand-lg">
<div class="container-fluid">
<a class="navbar-brand" href="index.html"><img src="img/logo.png"></a>
<div class="collapse navbar-collapse justify-content-center">
<ul class="navbar-nav">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link active" href="mezzi.html">Mezzi</a></li>
<li class="nav-item"><a class="nav-link" href="#">Allerte</a></li>
<li class="nav-item"><a class="nav-link" href="#">Volontari</a></li>
<li class="nav-item"><a class="nav-link" href="#">Contatti</a></li>
</ul>
</div>
</div>
</header>

<section class="hero">
<h1>Mezzi</h1>
<p>I veicoli utilizzati nelle attività operative della Protezione Civile</p>
</section>

<main class="container mt-5">

<div class="row g-4">

<!-- FIAT 16 -->
<div class="col-md-4">
<div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#mezzoModal"
data-name="Fiat 16"
data-image="img/16_1.jpeg"
data-d1="Mezzo agile per interventi rapidi"
data-d2="Perfetto per città"
data-d3="Trasporto squadra"
data-g1="img/16_1.jpeg"
data-g2="img/16_2.jpeg"
data-g3="img/16_3.jpeg"
data-g4="img/16_4.jpeg">

<div class="mezzo-img-wrap">
<img src="img/16_1.jpeg">
</div>

<div class="mezzo-card-body">
<h5>Fiat 16</h5>
<p>Interventi rapidi</p>
<div class="mezzo-meta">
<span class="mezzo-tag">Mobilità</span>
</div>
</div>

</div>
</div>

<!-- DEFENDER -->
<div class="col-md-4">
<div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#mezzoModal"
data-name="Defender"
data-image="img/Defender_1.jpeg"
data-d1="Fuoristrada"
data-d2="Terreni difficili"
data-d3="Supporto operativo"
data-g1="img/Defender_1.jpeg"
data-g2="img/Defender_2.jpeg"
data-g3="img/Defender_3.jpeg"
data-g4="img/Defender_4.jpeg">

<div class="mezzo-img-wrap">
<img src="img/Defender_1.jpeg">
</div>

<div class="mezzo-card-body">
<h5>Defender</h5>
<p>Fuoristrada</p>
<div class="mezzo-meta">
<span class="mezzo-tag">4x4</span>
</div>
</div>

</div>
</div>

<!-- PANDA -->
<div class="col-md-4">
<div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#mezzoModal"
data-name="Panda 4x4"
data-image="img/Panda_1.jpeg"
data-d1="Compatta"
data-d2="Strade strette"
data-d3="Sopralluoghi"
data-g1="img/Panda_1.jpeg"
data-g2="img/Panda_2.jpeg"
data-g3="img/Panda_3.jpeg"
data-g4="img/Panda_4.jpeg">

<div class="mezzo-img-wrap">
<img src="img/Panda_1.jpeg">
</div>

<div class="mezzo-card-body">
<h5>Panda 4x4</h5>
<p>Terreni impervi</p>
<div class="mezzo-meta">
<span class="mezzo-tag">Terreno</span>
</div>
</div>

</div>
</div>

</div>
</main>

<!-- MODAL -->
<div class="modal fade" id="mezzoModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content p-3">

<h3 id="title"></h3>

<img id="mainImg" class="modal-main-image">

<ul>
<li id="d1"></li>
<li id="d2"></li>
<li id="d3"></li>
</ul>

<div class="thumb-grid" id="gallery"></div>

</div>
</div>
</div>

<footer>
<div>Seguici</div>
<div class="social-links">
<a class="social-facebook" href="https://www.facebook.com/" target="_blank"><i class="fab fa-facebook-f"></i></a>
<a class="social-instagram" href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a>
</div>
<p>© 2025 Protezione Civile Grottammare</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>

<script>
document.querySelectorAll('.mezzo-card').forEach((card,i)=>{
card.addEventListener('click',function(){

document.getElementById('title').innerText=this.dataset.name;
document.getElementById('mainImg').src=this.dataset.image;

document.getElementById('d1').innerText=this.dataset.d1;
document.getElementById('d2').innerText=this.dataset.d2;
document.getElementById('d3').innerText=this.dataset.d3;

let g = document.getElementById('gallery');

g.innerHTML=`
<a href="${this.dataset.g1}" data-lightbox="g${i}"><img src="${this.dataset.g1}"></a>
<a href="${this.dataset.g2}" data-lightbox="g${i}"><img src="${this.dataset.g2}"></a>
<a href="${this.dataset.g3}" data-lightbox="g${i}"><img src="${this.dataset.g3}"></a>
<a href="${this.dataset.g4}" data-lightbox="g${i}"><img src="${this.dataset.g4}"></a>
`;

});
});
</script>

</body>
</html>
