<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mezzi - Protezione Civile Grottammare</title>

<link rel="icon" href="img/logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f8f9fa;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

main { flex: 1; }

/* Navbar alta e menu centrato */
.navbar {
  background: #f1c40f;
  padding: 15px 0;
}
.navbar-brand img { height: 60px; }
.navbar-nav { text-align: center; }
.nav-item { margin: 0 10px; }
.nav-link {
  font-weight: 600;
  font-size: 1.1rem;
  color: #004a99 !important;
}
.nav-link:hover { color: #002f66 !important; }
.nav-link.active { text-decoration: underline; }

/* Hero */
.hero {
  height: 300px;
  background: linear-gradient(rgba(0,74,153,0.6), rgba(241,196,15,0.4)), url('img/Mezzi.jpeg') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero h1 {
  color: white;
  font-weight: 900;
  font-size: 3rem;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
}

/* Card moderna */
.mezzo-card {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.35s ease;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}
.mezzo-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}
.mezzo-card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  transition: 0.5s;
}
.mezzo-card:hover img { transform: scale(1.1); }

/* Overlay effetto */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: white;
}
.overlay h5 { margin: 0; font-weight: 700; }
.overlay small { font-size: 0.9rem; }

/* Carousel fluido */
.carousel-item { transition: transform 0.6s ease-in-out; }
.carousel-item img { height: 420px; width: 100%; object-fit: cover; border-radius: 12px; }

/* Modal */
.modal-content { border-radius: 20px; border: none; }
.modal-header { border-bottom: none; }

/* Footer sempre in basso */
footer {
  background: #f1c40f;
  text-align: center;
  padding: 20px;
  color: #004a99;
  font-weight: 600;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand" href="#"><img src="img/logo.png" alt="Logo"></a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-center" id="menu">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Mezzi</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Allerte</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Volontari</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contatti</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Mezzi</h1>
</div>

<!-- MAIN -->
<main class="container mt-5">
  <div class="row g-4">

    <!-- Mezzo 1: Fiat 16 -->
    <div class="col-md-4">
      <div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#m1">
        <img src="img/16_1.jpeg" alt="Fiat 16">
        <div class="overlay"><h5>Fiat 16</h5><small>Interventi rapidi</small></div>
      </div>
    </div>

    <!-- Mezzo 2: Defender -->
    <div class="col-md-4">
      <div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#m2">
        <img src="img/Defender_1.jpeg" alt="Defender">
        <div class="overlay"><h5>Defender</h5><small>Fuoristrada</small></div>
      </div>
    </div>

    <!-- Mezzo 3: Ducato -->
    <div class="col-md-4">
      <div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#m3">
        <img src="img/Ducato_1.jpeg" alt="Ducato">
        <div class="overlay"><h5>Ducato</h5><small>Sala operativa</small></div>
      </div>
    </div>

    <!-- Mezzo 4: Bremach -->
    <div class="col-md-4">
      <div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#m4">
        <img src="img/Bremach_1.jpeg" alt="Bremach">
        <div class="overlay"><h5>Bremach</h5><small>Robusto</small></div>
      </div>
    </div>

    <!-- Mezzo 5: Scudo -->
    <div class="col-md-4">
      <div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#m5">
        <img src="img/Scudo_1.jpeg" alt="Scudo">
        <div class="overlay"><h5>Scudo</h5><small>Trasporto leggero</small></div>
      </div>
    </div>

    <!-- Mezzo 6: Panda 4x4 -->
    <div class="col-md-4">
      <div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#m6">
        <img src="img/Panda_1.jpeg" alt="Panda 4x4">
        <div class="overlay"><h5>Panda 4x4</h5><small>Terreni impervi</small></div>
      </div>
    </div>

    <!-- Mezzo 7: Autobotte -->
    <div class="col-md-4">
      <div class="mezzo-card" data-bs-toggle="modal" data-bs-target="#m7">
        <img src="img/Autobotte_1.jpeg" alt="Autobotte">
        <div class="overlay"><h5>Autobotte</h5><small>Trasporto acqua</small></div>
      </div>
    </div>

  </div>
</main>

<!-- MODALI TUTTI I MEZZI -->
<!-- (Come nell'esempio precedente, inserisci qui tutti i 7 modali con carousel a 4 immagini ciascuno) -->

<footer>
© 2025 Protezione Civile Grottammare
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
